name: Build & release (Windows + Linux)

# Compila Linux en la nube, toma las DLL de Windows del GodotLuau.zip ya
# commiteado, arma el zip UNIFICADO (ambos binarios, para el auto-updater de
# Windows y Linux) + dos zips por plataforma, commitea el zip y crea el Release
# "GodotLuau <version>" con los assets etiquetados por plataforma.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "SConstruct"
      - "Version"
      - "tools/generar_release.py"
      - ".github/workflows/build-release.yml"

permissions:
  contents: write

jobs:
  linux:
    # 22.04: glibc 2.35 — los binarios corren tambien en distros mas viejas
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install SCons
        run: pip install scons
      - name: Build template_debug
        run: scons platform=linux target=template_debug -j4
      - name: Build template_release
        run: scons platform=linux target=template_release -j4
      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: GodotLuau/bin/*.so

  release:
    needs: linux
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # Las DLL de Windows viven dentro del GodotLuau.zip que subo yo. Se sacan
      # de ahi (asi la CI no tiene que compilar Windows).
      - name: Extraer binarios de Windows del zip actual
        run: |
          mkdir -p GodotLuau/bin
          unzip -o GodotLuau.zip 'GodotLuau/bin/*' -d . || echo "zip sin bin (primera vez)"

      - name: Traer binarios de Linux (recien compilados)
        uses: actions/download-artifact@v4
        with:
          name: linux-bin
          path: GodotLuau/bin

      - name: Leer version
        id: ver
        run: |
          VER=$(head -n1 Version | tr -d '\r' | sed 's/^[ \t]*//; s/[ \t]*$//')
          echo "ver=$VER" >> "$GITHUB_OUTPUT"
          echo "tag=GodotLuau-$(echo "$VER" | tr -d ' ')" >> "$GITHUB_OUTPUT"
          echo "Version: $VER"

      - name: Empaquetar zips (unificado + por plataforma)
        run: |
          python3 tools/generar_release.py
          python3 tools/generar_release.py --only windows --out "Windows GodotLuau ${{ steps.ver.outputs.ver }}.zip"
          python3 tools/generar_release.py --only linux   --out "Linux GodotLuau ${{ steps.ver.outputs.ver }}.zip"

      - name: Commit GodotLuau.zip (auto-updater, Windows + Linux)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add GodotLuau.zip GodotLuau.zip.sha256
          git commit -m "CI: GodotLuau.zip con binarios Windows+Linux (${{ steps.ver.outputs.ver }}) [skip ci]" || echo "sin cambios en el zip"
          git push

      - name: Publicar Release unificado
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "GodotLuau ${{ steps.ver.outputs.ver }}"
          make_latest: true
          prerelease: false
          body: |
            Extensión GodotLuau para Godot 4 (Windows + Linux).
            Instala/actualiza sola con el plugin **GodotLuauUpdater**.
            Descarga manual por plataforma abajo:
          files: |
            Windows GodotLuau ${{ steps.ver.outputs.ver }}.zip
            Linux GodotLuau ${{ steps.ver.outputs.ver }}.zip
